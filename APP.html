<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转至 App Store...</title>
    <!-- HTML Meta Redirect (立即跳转) -->
    <meta http-equiv="refresh" content="0;url=https://apps.apple.com/cn/app/%E6%A0%91%E6%B4%9E%E5%A4%A9%E6%B0%94/id6760833311">
    
    <!-- JavaScript Redirect (作为补充保障) -->
    <script>
        // 使用 replace 避免在浏览器历史中留下记录，导致用户点击返回时再次被跳转
        window.location.replace("https://apps.apple.com/cn/app/%E6%A0%91%E6%B4%9E%E5%A4%A9%E6%B0%94/id6760833311");
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .loader {
            border: 4px solid #e5e5ea;
            border-top: 4px solid #007aff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 15px;
            color: #86868b;
            margin-top: 10px;
        }
        a {
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>正在前往 App Store...</h2>
        <p>如果页面没有自动跳转，请 <a href="https://apps.apple.com/cn/app/%E6%A0%91%E6%B4%9E%E5%A4%A9%E6%B0%94/id6760833311">点击此处</a>。</p>
    </div>
</body>
</html>
